services:
  asismetro-automations:
    image: ghcr.io/ismola/asismetro-automations:main
    container_name: asismetro-automations
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./temp_downloads:/app/temp_downloads
    ports:
      - "3001:3000"
    environment:      
      STAGE: ${STAGE:-production}
      VALID_TOKEN: ${ASISMETRO_BEARER_TOKEN:-sample}
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar_subscription_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/ismola/calendar-subscription-hub:migrate-main
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar_subscription_hub?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar_subscription_hub?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/calendar_subscription_hub?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL}
      ASISMETRO_API_BASE_URL: ${ASISMETRO_API_BASE_URL_DOCKER:-http://asismetro-automations:3000}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
      ASISMETRO_BEARER_TOKEN: ${ASISMETRO_BEARER_TOKEN:-sample}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-360}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      asismetro-automations:
        condition: service_healthy

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/calendar_subscription_hub?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL}
      ASISMETRO_API_BASE_URL: ${ASISMETRO_API_BASE_URL_DOCKER:-http://asismetro-automations:3000}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
      ASISMETRO_BEARER_TOKEN: ${ASISMETRO_BEARER_TOKEN:-sample}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-360}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      asismetro-automations:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
