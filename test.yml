services:
  asismetro-automations:
    image: ghcr.io/ismola/asismetro-automations:main
    container_name: asismetro-automations
    restart: unless-stopped
    # volumes:
    #   - ./logs:/app/logs
    #   - ./temp_downloads:/app/temp_downloads
    expose:
      - "3000"
    environment:
      # TZ: ${TZ:-Europe/Madrid}
      STAGE: ${STAGE:-production}
      VALID_TOKEN: ${ASISMETRO_BEARER_TOKEN:-sample}
      # AUTO_DELETE_LOGS: ${AUTO_DELETE_LOGS:-True}
      # HEADLESS_MODE: ${HEADLESS_MODE:-auto}
      # BROWSER_LANGUAGE: ${BROWSER_LANGUAGE:-en}
      # DOWNLOAD_DIR: ${DOWNLOAD_DIR:-temp_downloads}
      # PAGE_MAX_TIMEOUT: ${PAGE_MAX_TIMEOUT:-7}
      # DOWNLOAD_MAX_TIMEOUT: ${DOWNLOAD_MAX_TIMEOUT:-4}

    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:3000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cloudflare_default

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-calendar-subscription-hub
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar-subscription-hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cloudflare_default

  redis:
    container_name: redis-calendar-subscription-hub
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cloudflare_default

  migrate:
    container_name: migrate-calendar-subscription-hub
    image: ghcr.io/ismola/calendar-subscription-hub:migrate-main
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudflare_default

  web:
    image: ghcr.io/ismola/calendar-subscription-hub:web-main
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      ASISMETRO_API_BASE_URL: ${ASISMETRO_API_BASE_URL:-http://asismetro-automations:3000}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      ASISMETRO_BEARER_TOKEN: ${ASISMETRO_BEARER_TOKEN}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-360}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      asismetro-automations:
        condition: service_healthy
    networks:
      - cloudflare_default

  worker:
    image: ghcr.io/ismola/calendar-subscription-hub:worker-main
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379}
      ASISMETRO_API_BASE_URL: ${ASISMETRO_API_BASE_URL:-http://asismetro-automations:3000}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      ASISMETRO_BEARER_TOKEN: ${ASISMETRO_BEARER_TOKEN}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-360}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      asismetro-automations:
        condition: service_healthy
    networks:
      - cloudflare_default

volumes:
  postgres_data:
  redis_data:

networks:
  cloudflare_default:
    external: true
