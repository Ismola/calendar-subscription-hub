services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: postgres-calendar-subscription-hub
    expose:
      - "5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar-subscription-hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cloudflare_default
  redis:
    container_name: redis-calendar-subscription-hub
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cloudflare_default

  migrate:
    container_name: migrate-calendar-subscription-hub
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/calendar-subscription-hub?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cloudflare_default

  web:
    container_name: web-calendar-subscription-hub
    build:
      context: .
      target: runner
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-60}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - cloudflare_default
  worker:
    container_name: worker-calendar-subscription-hub
    build:
      context: .
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      DEFAULT_REFRESH_MINUTES: ${DEFAULT_REFRESH_MINUTES:-60}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - cloudflare_default

volumes:
  postgres_data:
  redis_data:

networks:
  cloudflare_default:
    external: true