#
name: 🚀 Publish

# Este workflow debe ser llamado desde deploy.yml, no ejecutarse directamente
on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # smoke: job removido - los tests ya se ejecutan en deploy.yml
  build-and-push-image:
    # needs: [smoke]  # Removido - deploy.yml ya asegura que los tests pasen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # Uses the `docker/login-action` action to log in to the Container registry registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for web image
        id: meta_web
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=web-main
            type=sha,prefix=web-
            type=ref,event=tag,prefix=web-
            type=ref,event=branch,prefix=web-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Extract metadata (tags, labels) for worker image
        id: meta_worker
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=worker-main
            type=sha,prefix=worker-
            type=ref,event=tag,prefix=worker-
            type=ref,event=branch,prefix=worker-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Extract metadata (tags, labels) for migrate image
        id: meta_migrate
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=migrate-main
            type=sha,prefix=migrate-
            type=ref,event=tag,prefix=migrate-
            type=ref,event=branch,prefix=migrate-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push web image
        id: push_web
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          target: runner
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_web.outputs.tags }}
          labels: ${{ steps.meta_web.outputs.labels }}

      - name: Build and push worker image
        id: push_worker
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          target: worker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}

      - name: Build and push migrate image
        id: push_migrate
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          target: migrate
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_migrate.outputs.tags }}
          labels: ${{ steps.meta_migrate.outputs.labels }}

      - name: Generate artifact attestation (web)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push_web.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (worker)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push_worker.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation (migrate)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push_migrate.outputs.digest }}
          push-to-registry: true
